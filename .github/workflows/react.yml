name: ReactDeploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "react/**"
      - ".github/workflows/react-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "react/**"
      - ".github/workflows/react-deploy.yml"

permissions:
  id-token: write
  contents: read

concurrency:
  group: react-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  WORKING_DIR: react
  BUILD_DIR: dist
  AWS_REGION: ${{ vars.AWS_REGION }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  S3_BUCKET_BASE: ${{ vars.S3_BUCKET_NAME }}
  PROD_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}-${{ vars.ENVIRONMENT }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test --if-present

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-dist
          path: ${{ env.WORKING_DIR }}/${{ env.BUILD_DIR }}
          if-no-files-found: error
          retention-days: 7

  deploy-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy preview to S3 prefix
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          PREVIEW_PREFIX="preview/pr-${PR_NUMBER}"
          aws s3 sync dist/ s3://${PROD_BUCKET_NAME}/${PREVIEW_PREFIX}/ --delete

  deploy-production:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: react-dist
          path: dist

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          echo "Deploy bucket: ${PROD_BUCKET_NAME}"
          aws s3 sync dist/ s3://${PROD_BUCKET_NAME}/ --delete

      - name: Cache-control for entry files
        run: |
          aws s3 cp dist/index.html s3://${PROD_BUCKET_NAME}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront
        if: vars.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"